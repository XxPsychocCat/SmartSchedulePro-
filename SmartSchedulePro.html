<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSchedule Pro - Fixed</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border-color: #334155;
            --input-bg: #1e293b; /* Đồng bộ nền input với nền card */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background 0.2s, color 0.2s; }

        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .theme-switch { cursor: pointer; padding: 10px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border-color); font-size: 1.2rem; }

        .dashboard { display: grid; grid-template-columns: 320px 1fr; gap: 25px; }
        @media (max-width: 1024px) { .dashboard { grid-template-columns: 1fr; } }

        .sidebar {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            position: sticky; top: 20px;
        }

        .input-group { margin-bottom: 18px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: var(--text-sub); }
        
        /* Cập nhật quan trọng cho Input và Select */
        input, select {
            width: 100%; 
            padding: 12px; 
            border: 1.5px solid var(--border-color);
            border-radius: 10px; 
            background-color: var(--input-bg); /* Đảm bảo nền luôn đúng */
            color: var(--text-main); 
            outline: none;
            appearance: none; /* Xóa style mặc định của hệ thống */
            -webkit-appearance: none;
        }

        /* Fix lỗi chữ trắng trên nền trắng ở dropdown */
        select option {
            background-color: var(--card-bg);
            color: var(--text-main);
        }

        .color-picker { display: flex; gap: 10px; margin-top: 5px; }
        .color-dot { width: 25px; height: 25px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: var(--primary-color); transform: scale(1.1); }

        #suggestions {
            position: absolute; width: 100%; background: var(--card-bg);
            border: 1px solid var(--border-color); border-radius: 8px;
            z-index: 10; display: none; margin-top: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .suggest-item { padding: 10px; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid var(--border-color); }
        .suggest-item:last-child { border-none; }
        .suggest-item:hover { background: var(--primary-color); color: white; }

        .timetable-wrapper {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow-x: auto;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 10px; min-width: 800px; }
        th { padding: 15px; background: rgba(99, 102, 241, 0.1); border-radius: 12px; color: var(--primary-color); }
        td { background: rgba(128, 128, 128, 0.05); min-height: 120px; border-radius: 12px; padding: 10px; vertical-align: top; width: 14%; border: 1px solid var(--border-color); }

        .subject-card { padding: 12px; border-radius: 10px; margin-bottom: 10px; position: relative; animation: slideIn 0.3s ease; color: #1e293b; }
        .subject-card b { display: block; font-size: 0.95rem; margin-bottom: 4px; }
        .subject-card span { font-size: 0.75rem; opacity: 0.8; }
        .del-btn { position: absolute; top: 5px; right: 8px; cursor: pointer; font-size: 12px; opacity: 0.5; }
        .del-btn:hover { opacity: 1; color: red; }

        button.main-btn {
            width: 100%; padding: 14px; background: var(--primary-color);
            color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body data-theme="dark"> <div class="container">
    <header>
        <div>
            <h1>SmartSchedule <sup>Pro</sup></h1>
            <p id="status-msg">Xin chào, hôm nay bạn học gì?</p>
        </div>
        <button class="theme-switch" onclick="toggleTheme()" id="themeBtn">☀️</button>
    </header>

    <div class="dashboard">
        <div class="sidebar">
            <div class="input-group">
                <label>Tên môn học</label>
                <input type="text" id="subject" placeholder="Ví dụ: Toán, Anh văn..." oninput="showSuggestions(this.value)">
                <div id="suggestions"></div>
            </div>

            <div class="input-group">
                <label>Thời gian</label>
                <input type="text" id="time" placeholder="08:00 - 09:30">
            </div>

            <div class="input-group">
                <label>Thứ trong tuần</label>
                <select id="day">
                    <option value="2">Thứ Hai</option>
                    <option value="3">Thứ Ba</option>
                    <option value="4">Thứ Tư</option>
                    <option value="5">Thứ Năm</option>
                    <option value="6">Thứ Sáu</option>
                    <option value="7">Thứ Bảy</option>
                </select>
            </div>

            <div class="input-group">
                <label>Màu sắc chủ đạo</label>
                <div class="color-picker" id="colorPicker">
                    <div class="color-dot active" style="background: #c7d2fe;" data-color="#c7d2fe"></div>
                    <div class="color-dot" style="background: #fbcfe8;" data-color="#fbcfe8"></div>
                    <div class="color-dot" style="background: #bbf7d0;" data-color="#bbf7d0"></div>
                    <div class="color-dot" style="background: #fef3c7;" data-color="#fef3c7"></div>
                    <div class="color-dot" style="background: #ddd6fe;" data-color="#ddd6fe"></div>
                </div>
            </div>

            <button class="main-btn" onclick="addSchedule()">Lưu vào hệ thống</button>
        </div>

        <div class="timetable-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>T. Hai</th><th>T. Ba</th><th>T. Tư</th><th>T. Năm</th><th>T. Sáu</th><th>T. Bảy</th>
                    </tr>
                </thead>
                <tbody id="timetableBody">
                    <tr>
                        <td id="td-2"></td><td id="td-3"></td><td id="td-4"></td><td id="td-5"></td><td id="td-6"></td><td id="td-7"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let scheduleData = JSON.parse(localStorage.getItem('mySchedule')) || [];
    let selectedColor = "#c7d2fe";

    window.onload = () => { renderSchedule(); };

    // Xử lý chọn màu
    document.querySelectorAll('.color-dot').forEach(dot => {
        dot.addEventListener('click', () => {
            document.querySelector('.color-dot.active').classList.remove('active');
            dot.classList.add('active');
            selectedColor = dot.dataset.color;
        });
    });

    const timeDatabase = {
        "toán": ["07:30 - 09:00", "13:30 - 15:00"],
        "anh văn": ["09:15 - 10:45", "15:15 - 16:45"],
        "văn": ["07:30 - 09:30"],
        "đại học": ["08:00 - 11:30", "13:00 - 16:30"]
    };

    function showSuggestions(val) {
        const suggBox = document.getElementById('suggestions');
        suggBox.innerHTML = '';
        const key = val.toLowerCase();
        
        if (timeDatabase[key]) {
            suggBox.style.display = 'block';
            timeDatabase[key].forEach(time => {
                const div = document.createElement('div');
                div.className = 'suggest-item';
                div.innerText = `Gợi ý: ${time}`;
                div.onclick = () => {
                    document.getElementById('time').value = time;
                    suggBox.style.display = 'none';
                };
                suggBox.appendChild(div);
            });
        } else {
            suggBox.style.display = 'none';
        }
    }

    function addSchedule() {
        const sub = document.getElementById('subject').value;
        const day = document.getElementById('day').value;
        const time = document.getElementById('time').value;

        if (!sub || !time) return alert("Nhập đầy đủ thông tin!");

        scheduleData.push({ id: Date.now(), sub, day, time, color: selectedColor });
        saveAndRender();
        document.getElementById('subject').value = '';
        document.getElementById('time').value = '';
    }

    function saveAndRender() {
        localStorage.setItem('mySchedule', JSON.stringify(scheduleData));
        renderSchedule();
    }

    function renderSchedule() {
        for (let i = 2; i <= 7; i++) document.getElementById(`td-${i}`).innerHTML = '';
        scheduleData.forEach(item => {
            const td = document.getElementById(`td-${item.day}`);
            if(td) {
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.style.background = item.color;
                card.innerHTML = `
                    <span class="del-btn" onclick="deleteItem(${item.id})">✕</span>
                    <b>${item.sub}</b>
                    <span>${item.time}</span>
                `;
                td.appendChild(card);
            }
        });
    }

    function deleteItem(id) {
        scheduleData = scheduleData.filter(i => i.id !== id);
        saveAndRender();
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerText = '🌙';
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '☀️';
        }
    }
</script>
</body>
</html>
